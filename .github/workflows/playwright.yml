name: Playwright OrangeHr

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
  - cron: '0 13 * * *' # Running otomatis jam 20:00 WIB
  workflow_dispatch:
    # Trigger manual dari GitHub Actions

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Get Playwright version
      run: echo "PLAYWRIGHT_VERSION=$(node -e "console.log(require('@playwright/test/package.json').version)")" >> $GITHUB_ENV

    - name: Cache Playwright Browsers
      uses: actions/cache@v4
      id: playwright-cache
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}

    - name: Install Playwright Browsers
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: npx playwright install --with-deps

    - name: Run Playwright tests
      run: npx bddgen && npx playwright test
      continue-on-error: true

    - name: Upload Allure Results as Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: raw-allure-results
        path: allure-results/
        retention-days: 7

    - name: Get Allure history
      if: always()
      continue-on-error: true
      uses: actions/checkout@v4
      with:
        ref: gh-pages
        path: allure-history

    - name: Generate Allure Report
      if: always()
      run: |
        npm install -g allure-commandline
        allure generate allure-results --clean -o allure-history/${{ github.run_number }}
        cp -r allure-history/${{ github.run_number }}/* allure-history/

    - name: Notify if tests failed
      if: failure()
      run: echo "::error title=Test Failed::Ada test yang gagal, cek Allure Report!"

    - name: Deploy report to Github Pages
      if: always()
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: allure-history

    - name: Warm up GitHub Pages
      if: always()
      run: |
        echo "Waiting for pages to deploy..."
        sleep 30
        curl -s https://fadhil65.github.io/OrangeHR-PW-TS/ > /dev/null
        echo "Pages warmed up! ✅"
